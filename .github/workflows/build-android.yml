name: 🚀 Android APK & AAB Build

on:
  push:
    branches: [ main, develop, cursor/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 📱 Build Android App
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: ☕ Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 🐘 Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: wrapper
        
    - name: 🔧 Make Gradlew Executable
      run: chmod +x ./gradlew
      
    - name: 🧹 Clean Project
      run: ./gradlew clean
      
    - name: 📦 Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: 📦 Build Release APK
      run: ./gradlew assembleRelease
      
    - name: 🎁 Build Debug AAB
      run: ./gradlew bundleDebug
      
    - name: 🎁 Build Release AAB
      run: ./gradlew bundleRelease
      
    - name: 📊 List Generated Files
      run: |
        echo "🔍 Generated APK Files:"
        find . -name "*.apk" -type f | head -10
        echo ""
        echo "🔍 Generated AAB Files:"
        find . -name "*.aab" -type f | head -10
        echo ""
        echo "📏 File Sizes:"
        ls -lh app/build/outputs/apk/debug/*.apk 2>/dev/null || echo "Debug APK not found"
        ls -lh app/build/outputs/apk/release/*.apk 2>/dev/null || echo "Release APK not found"
        ls -lh app/build/outputs/bundle/debug/*.aab 2>/dev/null || echo "Debug AAB not found"
        ls -lh app/build/outputs/bundle/release/*.aab 2>/dev/null || echo "Release AAB not found"
      
    - name: 📤 Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: 📱-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
        
    - name: 📤 Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: 📱-release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
        
    - name: 📤 Upload Debug AAB
      uses: actions/upload-artifact@v4
      with:
        name: 🎁-debug-aab
        path: app/build/outputs/bundle/debug/*.aab
        retention-days: 30
        
    - name: 📤 Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: 🎁-release-aab
        path: app/build/outputs/bundle/release/*.aab
        retention-days: 30

  release:
    name: 🏷️ Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      
    - name: 📥 Download APK Artifacts
      uses: actions/download-artifact@v4
      with:
        name: 📱-release-apk
        path: ./apk/
        
    - name: 📥 Download AAB Artifacts
      uses: actions/download-artifact@v4
      with:
        name: 🎁-release-aab
        path: ./aab/
        
    - name: 🏷️ Create Release Tag
      id: tag
      run: |
        TAG="v1.0.$(date +%Y%m%d%H%M%S)"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Generated tag: $TAG"
        
    - name: 🚀 Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: 🚀 Uygulamam Release ${{ steps.tag.outputs.tag }}
        body: |
          ## 📱 Uygulamam - Yeni Sürüm
          
          ### 📦 İndirilebilir Dosyalar:
          - **APK**: Android telefona yüklemek için
          - **AAB**: Google Play Store'a yüklemek için
          
          ### ✨ Özellikler:
          - Modern Material Design arayüzü
          - Basit sayaç fonksiyonalitesi
          - Türkçe dil desteği
          - Responsive tasarım
          
          ### 🛠️ Teknik Detaylar:
          - **Platform**: Android 5.0+ (API 21+)
          - **Dil**: Kotlin
          - **UI**: Material Design 3
          - **Build**: ${{ github.sha }}
          
          ---
          Otomatik olarak GitHub Actions ile oluşturuldu 🤖
        files: |
          ./apk/*.apk
          ./aab/*.aab
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}